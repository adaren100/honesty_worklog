<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Honest Log — Ada's Notes</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&family=Spectral:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="worklog.css" />

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: #f8f4ed; color: #16161a;
    font-family: "Spectral", Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 1280px; margin: 0 auto; }
  .pad { padding-left: 80px; padding-right: 80px; }

  nav.bar { display: flex; align-items: center; justify-content: space-between;
    height: 72px; border-bottom: 2px solid #16161a; }
  .brand { font-family: "Playfair Display", serif; font-size: 22px; font-weight: 700; letter-spacing: -.01em;
    color: #16161a; text-decoration: none; }
  .navlinks { display: flex; gap: 36px; font-family: "DM Mono", monospace; font-size: 11px;
    letter-spacing: .1em; text-transform: uppercase; color: #6b6258; }
  .navlinks a { color: inherit; text-decoration: none; }
  .navlinks a:hover { color: #1e3a72; }

  .log-hero { display: grid; grid-template-columns: 360px 1fr; gap: 0; }
  .log-note { padding: 64px 48px 64px 80px; border-right: 1px solid #dad0c1; }
  .crumb { font-family: "DM Mono", monospace; font-size: 11px; color: #2952a8; text-decoration: none;
    letter-spacing: .04em; display: inline-block; margin-bottom: 28px; }
  .crumb:hover { text-decoration: underline; }
  .log-eyebrow { font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: .14em;
    text-transform: uppercase; color: #a89d91; margin-bottom: 16px; }
  .log-title { font-family: "Playfair Display", serif; font-weight: 700; font-size: 42px;
    line-height: 1.08; letter-spacing: -.02em; margin: 0 0 22px; }
  .log-lede { font-family: "Spectral", serif; font-style: italic; font-size: 16px; line-height: 1.75;
    color: #6b6258; margin: 0 0 18px; max-width: 34ch; }
  .log-meta { font-family: "DM Mono", monospace; font-size: 11.5px; line-height: 1.8; color: #a89d91; margin: 0; }
  .log-meta b { color: #1e3a72; font-weight: 500; }
  .log-stage { display: flex; align-items: flex-start; justify-content: center; padding: 56px 80px 64px; }

  .month-nav { display: flex; gap: 8px; align-items: center; margin-top: 24px;
    font-family: "DM Mono", monospace; font-size: 11px; color: #6b6258; }
  .month-nav button { font: inherit; color: inherit; background: none;
    border: 1px solid #dad0c1; border-radius: 6px; padding: 3px 8px; cursor: pointer; }
  .month-nav button:disabled { opacity: .3; cursor: default; }

  .log-foot { border-top: 2px solid #16161a; display: flex; justify-content: space-between;
    align-items: center; height: 64px; font-family: "DM Mono", monospace; font-size: 11px;
    letter-spacing: .06em; text-transform: uppercase; color: #a89d91; }
  .log-foot a { color: #2952a8; text-decoration: none; }

  @media (max-width: 900px) {
    .log-hero { grid-template-columns: 1fr; }
    .log-note { border-right: 0; border-bottom: 1px solid #dad0c1; padding: 48px 80px; }
    .log-stage { padding: 32px 80px 56px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="widget.jsx"></script>
  <script type="text/babel" src="month.jsx"></script>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const WL_PALETTE = ["#3f9d6f","#3b6fa0","#2f8e8a","#7b6cd9","#d99a3c","#cf5670"];
    const WL_KEYS = ["research","coding","writing","meeting","admin","personal"];
    const WL_LABELS = ["Reading","Coding","Writing","Meeting","Slacking","Doomscrolling"];

    function Worklog() {
      const months = window.WORKLOG_MONTHS || { [window.WORKLOG_MONTH.key || "current"]: window.WORKLOG_MONTH };
      const monthKeys = Object.keys(months).sort();

      // Default = yesterday (today - 1). Fall back to last day with data if yesterday isn't in dataset.
      const yest = useMemo(() => {
        const d = new Date(); d.setDate(d.getDate() - 1);
        return { y: d.getFullYear(), m: d.getMonth() + 1, d: d.getDate() };
      }, []);
      const yestMonthKey = `${yest.y}-${String(yest.m).padStart(2, "0")}`;
      const yestDayKey = `${yest.y}-${yest.m}-${yest.d}`;

      const defaultKey = window.WORKLOG_DEFAULT_MONTH
        || (months[yestMonthKey] ? yestMonthKey : monthKeys[monthKeys.length - 1]);
      const [monthKey, setMonthKey] = useState(defaultKey);
      const M = months[monthKey] || window.WORKLOG_MONTH;

      const cats = {};
      WL_KEYS.forEach((k,i) => cats[k] = { label: WL_LABELS[i], color: WL_PALETTE[i] });

      const lastIdx = useMemo(() => {
        if (monthKey === yestMonthKey) {
          const i = M.days.findIndex((d) => d.key === yestDayKey);
          if (i >= 0) return i;
        }
        for (let i = M.days.length - 1; i >= 0; i--) {
          const d = M.days[i];
          if ((d.events && d.events.length > 0) || d.logged > 0) return i;
        }
        return M.days.length - 1;
      }, [M, monthKey, yestMonthKey, yestDayKey]);
      const [view, setView] = useState("month");
      const [dayIdx, setDayIdx] = useState(lastIdx);
      useEffect(() => { setDayIdx(lastIdx); }, [monthKey, lastIdx]);
      const day = M.days[dayIdx];
      const openDay = (i) => { setDayIdx(i); setView("day"); };

      const monthIdx = monthKeys.indexOf(monthKey);
      return (
        <div className="worklog-embed">
          <div className="wl-card">
            <div className="wl-topbar">
              <span className="wl-kicker">Honest Worklog</span>
              <span className="wl-toggle">
                <button className={view === "day" ? "is-on" : ""} onClick={() => setView("day")}>Day</button>
                <button className={view === "month" ? "is-on" : ""} onClick={() => setView("month")}>Month</button>
              </span>
            </div>
            {view === "day" ? (
              <window.DayView day={day} tone="savage" showStats={true} cats={cats}
                onPrev={() => setDayIdx((i) => Math.max(0, i - 1))}
                onNext={() => setDayIdx((i) => Math.min(M.days.length - 1, i + 1))}
                hasPrev={dayIdx > 0} hasNext={dayIdx < M.days.length - 1} />
            ) : (
              <window.MonthView M={M} tone="savage" cats={cats} onSelectDay={openDay}
                onPrevMonth={() => monthIdx > 0 && setMonthKey(monthKeys[monthIdx - 1])}
                onNextMonth={() => monthIdx < monthKeys.length - 1 && setMonthKey(monthKeys[monthIdx + 1])}
                hasPrevMonth={monthIdx > 0}
                hasNextMonth={monthIdx < monthKeys.length - 1} />
            )}
          </div>
        </div>
      );
    }

    function Page() {
      return (
        <div className="page">
          <nav className="bar pad">
            <a className="brand" href="index.html">Ada's Notes</a>
            <div className="navlinks">
              <a href="index.html">AI Digest(今日动态)</a>
              <a href="index.html">Big Tech Research</a>
              <a href="index.html">Post(手作)</a>
              <a href="index.html">Archive</a>
            </div>
          </nav>

          <div className="log-hero">
            <div className="log-note">
              <a className="crumb" href="index.html">← Back to notes</a>
              <div className="log-eyebrow">This month, honestly</div>
              <h1 className="log-title">Where the time actually went</h1>
              <p className="log-lede">
                Every hour logged — the deep work, and the long tail of
                "just one more tab." Here's the honest breakdown.
              </p>
              <p className="log-meta">
                <b>Reading · Coding · Writing</b> count as real work.<br/>
                Slacking and doomscrolling, regrettably, do not.<br/><br/>
                Tap any day to see where it actually went.
              </p>
            </div>
            <div className="log-stage">
              <Worklog />
            </div>
          </div>

          <div className="log-foot pad">
            <span>Ada · adaren100.github.io · 2026</span>
            <a href="index.html">← Back to notes</a>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
  </script>
</body>
</html>
